# ============================================================================
# NEVI KEYBINDINGS
# ============================================================================
#
# Documents Nevi's built-in default keybindings (motions, operators, text
# objects, finder, terminal, registers). Embedded at build time to power the
# :Keymaps cheatsheet picker.
#
# Scope: built-in *default* keys only. At runtime the :Keymaps picker overlays
# this file with live sources, so the cheatsheet reflects actual behavior:
#   - commands come from the editor's command registry;
#   - leader bindings and the user's own remaps come from the user's config.
# A user's remaps therefore appear even though they are not listed here.
#
# FORMAT:
# [[mode.category]]   # or [[mode]] for flat sections (terminal, text_objects, registers)
# key = "x"                    # The key(s) to press
# action = "action_name"       # Editor action or ":Command<CR>"
# desc = "Description"         # What it does
# status = "implemented"       # "implemented" | "partial" | "planned"
# vim_default = true           # Is this a standard vim keybind?
#
# MODIFIER NOTATION:
# <C-x> = Ctrl+x    <A-x> = Alt+x    <S-x> = Shift+x
# <CR> = Enter      <Esc> = Escape   <Tab> = Tab
# <Space> = Space   <BS> = Backspace
#
# ORGANIZATION:
# Within each category, implemented keybinds are grouped by behavior.
#
# Last Updated: 2026-06-22
# ============================================================================

# ============================================================================
